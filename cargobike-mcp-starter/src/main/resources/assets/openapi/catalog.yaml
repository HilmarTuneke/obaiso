
openapi: 3.1.0
info:
  title: Catalog Service
  version: 1.0.0
  description: List and describe cargo bikes.
servers:
  - url: https://api.example.com
paths:
  /api/catalog/cargo-bikes:
    get:
      summary: List cargo bikes
      operationId: listCargoBikes
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/CargoBike'
                        - $ref: '#/components/schemas/EbikeCargoBike'
components:
  schemas:
    CargoBike:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/catalog#CargoBike
      x-jsonld-context:
        cat: https://example.com/ont/cargobike/catalog#
        sku: cat:hasSku
        modelName: cat:modelName
        weightKg: cat:hasWeightKg
        maxPayloadKg: cat:hasMaxPayloadKg
        wheelCount: cat:hasWheelCount
      properties:
        sku:
          type: string
        modelName:
          type: string
        weightKg:
          type: number
          format: float
        maxPayloadKg:
          type: number
          format: float
        wheelCount:
          type: integer
      required: [sku, modelName]
    EbikeCargoBike:
      allOf:
        - $ref: '#/components/schemas/CargoBike'
        - type: object
          x-jsonld-type: https://example.com/ont/cargobike/catalog#EbikeCargoBike
          x-jsonld-context:
            cat: https://example.com/ont/cargobike/catalog#
            batteryCapacityWh: cat:hasBatteryCapacityWh
          properties:
            batteryCapacityWh:
              type: integer