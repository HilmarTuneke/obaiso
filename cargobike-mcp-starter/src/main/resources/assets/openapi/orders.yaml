
openapi: 3.1.0
info:
  title: Orders Service
  version: 1.0.0
servers: [ { url: https://api.example.com } ]
paths:
  /api/orders/{orderId}:
    get:
      summary: Get order by ID
      operationId: getOrder
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: string }
          x-jsonld-context:
            orderId: https://example.com/ont/cargobike/orders#orderId
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    Price:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/orders#Price
      x-jsonld-context:
        ord: https://example.com/ont/cargobike/orders#
        amount: ord:amount
        currency: ord:currency
      properties:
        amount: { type: number, format: float }
        currency: { type: string }
      required: [amount, currency]
    OrderItem:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/orders#OrderItem
      x-jsonld-context:
        cat: https://example.com/ont/cargobike/catalog#
        ord: https://example.com/ont/cargobike/orders#
        sku: cat:hasSku
        quantity: ord:quantity
      properties:
        sku: { type: string }
        quantity: { type: integer }
        unitPrice: { $ref: '#/components/schemas/Price' }
      required: [sku, quantity]
    Customer:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/customers#Customer
      x-jsonld-context:
        cus: https://example.com/ont/cargobike/customers#
        customerId: cus:customerId
        email: cus:email
      properties:
        customerId: { type: string }
        email: { type: string, format: email }
      required: [customerId]
    Order:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/orders#Order
      x-jsonld-context:
        ord: https://example.com/ont/cargobike/orders#
        orderId: ord:orderId
        hasStatus: ord:hasStatus
        orderedBy: ord:orderedBy
        hasItem: ord:hasItem
        hasTotalPrice: ord:hasTotalPrice
      properties:
        orderId: { type: string }
        hasStatus: { type: string }
        orderedBy: { $ref: '#/components/schemas/Customer' }
        hasItem:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        hasTotalPrice: { $ref: '#/components/schemas/Price' }
      required: [orderId, orderedBy]