
openapi: 3.1.0
info:
  title: Inventory Service
  version: 1.0.0
servers: [ { url: https://api.example.com } ]
paths:
  /api/inventory/{sku}:
    get:
      summary: Get inventory for SKU
      operationId: getInventoryForSku
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
          x-jsonld-context:
            sku: https://example.com/ont/cargobike/catalog#hasSku
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
components:
  schemas:
    InventoryItem:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/inventory#InventoryItem
      x-jsonld-context:
        inv: https://example.com/ont/cargobike/inventory#
        cat: https://example.com/ont/cargobike/catalog#
        sku: cat:hasSku
        hasQuantity: inv:hasQuantity
        warehouseCode: inv:warehouseCode
      properties:
        sku: { type: string }
        hasQuantity: { type: integer }
        warehouseCode: { type: string }
      required: [sku, hasQuantity]