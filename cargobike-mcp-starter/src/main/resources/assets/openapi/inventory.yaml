
openapi: 3.1.0
info:
  title: Inventory Service
  version: 1.0.0
  x-semantic:
    prefixes:
      inv: https://example.com/ont/cargobike/inventory#
      cat: https://example.com/ont/cargobike/catalog#
servers: [ { url: https://api.example.com } ]
paths:
  /api/inventory/{sku}:
    get:
      summary: Get inventory for SKU
      operationId: getInventoryForSku
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
          x-semantic: cat:hasSku
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
components:
  schemas:
    InventoryItem:
      type: object
      x-semantic: inv:InventoryItem
      properties:
        sku: { type: string, x-semantic: cat:hasSku }
        hasQuantity: { type: integer, x-semantic: inv:hasQuantity }
        warehouseCode: { type: string, x-semantic: inv:warehouseCode }
      required: [sku, hasQuantity]