
openapi: 3.1.0
info:
  title: Shipping Service
  version: 1.0.0
  x-semantic:
    prefixes:
      shp: https://example.com/ont/cargobike/shipping#
      cus: https://example.com/ont/cargobike/customers#
      ord: https://example.com/ont/cargobike/orders#
      cat: https://example.com/ont/cargobike/catalog#
servers: [ { url: https://api.example.com } ]
paths:
  /api/shipping/quote:
    post:
      summary: Get shipping quote
      operationId: getShippingQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/ShipmentQuote'
components:
  schemas:
    QuoteRequest:
      type: object
      properties:
        postalCode: { type: string, x-semantic: cus:postalCode }
        countryCode: { type: string, x-semantic: cus:countryCode }
        weightKg: { type: number, format: float, x-semantic: cat:hasWeightKg }
      required: [postalCode, weightKg]
    Price:
      type: object
      x-semantic: ord:Price
      properties:
        amount: { type: number, format: float, x-semantic: ord:amount }
        currency: { type: string, x-semantic: ord:currency }
      required: [amount, currency]
    Address:
      type: object
      x-semantic: cus:Address
      properties:
        postalCode: { type: string, x-semantic: cus:postalCode }
        countryCode: { type: string, x-semantic: cus:countryCode }
    ShipmentQuote:
      type: object
      x-semantic: shp:ShipmentQuote
      properties:
        shipsTo: { $ref: '#/components/schemas/Address', x-semantic: shp:shipsTo }
        totalWeightKg: { type: number, format: float, x-semantic: cat:hasWeightKg }
        hasTotalPrice: { $ref: '#/components/schemas/Price', x-semantic: ord:hasTotalPrice }
        estimatedDays: { type: integer, x-semantic: shp:estimatedDays }
      required: [shipsTo, hasTotalPrice]