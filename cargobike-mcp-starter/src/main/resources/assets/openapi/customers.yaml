
openapi: 3.1.0
info:
  title: Customers Service
  version: 1.0.0
  x-semantic:
    prefixes:
      cus: https://example.com/ont/cargobike/customers#
servers: [ { url: https://api.example.com } ]
paths:
  /api/customers/{customerId}:
    get:
      summary: Get customer by ID
      operationId: getCustomer
      parameters:
        - in: path
          name: customerId
          required: true
          schema: { type: string }
          x-semantic: cus:customerId
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Customer'
components:
  schemas:
    Address:
      type: object
      x-semantic: cus:Address
      properties:
        street: { type: string, x-semantic: cus:street }
        city: { type: string, x-semantic: cus:city }
        postalCode: { type: string, x-semantic: cus:postalCode }
        countryCode: { type: string, x-semantic: cus:countryCode }
      required: [postalCode, countryCode]
    Customer:
      type: object
      x-semantic: cus:Customer
      properties:
        customerId: { type: string, x-semantic: cus:customerId }
        fullName: { type: string, x-semantic: cus:fullName }
        email: { type: string, format: email, x-semantic: cus:email }
        hasAddress: { $ref: '#/components/schemas/Address', x-semantic: cus:hasAddress }
      required: [customerId]