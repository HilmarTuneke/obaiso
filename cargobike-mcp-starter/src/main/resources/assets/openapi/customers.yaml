
openapi: 3.1.0
info:
  title: Customers Service
  version: 1.0.0
servers: [ { url: https://api.example.com } ]
paths:
  /api/customers/{customerId}:
    get:
      summary: Get customer by ID
      operationId: getCustomer
      parameters:
        - in: path
          name: customerId
          required: true
          schema: { type: string }
          x-jsonld-context:
            customerId: https://example.com/ont/cargobike/customers#customerId
      responses:
        "200":
          description: OK
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Customer'
components:
  schemas:
    Address:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/customers#Address
      x-jsonld-context:
        cus: https://example.com/ont/cargobike/customers#
        street: cus:street
        city: cus:city
        postalCode: cus:postalCode
        countryCode: cus:countryCode
      properties:
        street: { type: string }
        city: { type: string }
        postalCode: { type: string }
        countryCode: { type: string }
      required: [postalCode, countryCode]
    Customer:
      type: object
      x-jsonld-type: https://example.com/ont/cargobike/customers#Customer
      x-jsonld-context:
        cus: https://example.com/ont/cargobike/customers#
        customerId: cus:customerId
        fullName: cus:fullName
        email: cus:email
        hasAddress: cus:hasAddress
      properties:
        customerId: { type: string }
        fullName: { type: string }
        email: { type: string, format: email }
        hasAddress: { $ref: '#/components/schemas/Address' }
      required: [customerId]